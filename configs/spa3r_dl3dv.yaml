model:
  class_name: model.spa3r.Spa3R
  embed_dim: 768
  num_heads: 12
  aggregator_depth: 12
  decoder_depth: 12
  patch_size: 14
  image_size: 336
  num_register_tokens: 4
  mlp_ratio: 4.0
  init_values: 0.01
  qk_norm: true
  rope_freq: 100
  patch_embed: dinov2_vitb14_reg
  backbone_pretrained: auto
  freeze_backbone: true
  pose_head_depth: 4
  image_tokenizer:
    image_size: 336
    patch_size: 14
    in_channels: 3
  target_image:
    height: 336
    width: 336
    patch_size: 14
    in_channels: 6

training:
  amp_dtype: bf16
  api_key_path: ./configs/api_keys.yaml
  batch_size_per_gpu: 32
  beta1: 0.9
  beta2: 0.95
  allowed_gradnorm_factor: 2.0
  center_crop: true
  scene_scale_factor: 1.35
  checkpoint_dir: ./experiments/checkpoints/spa3r_dl3dv
  checkpoint_every: 2000
  dataset_name: data.dataset_scene.Dataset
  dataset_path: /horizon-bucket/robot_lab/users/haoyi.jiang/repos/rayzer/dl3dv_10k_train.txt
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0

  l2_loss_weight: 1.0
  lpips_loss_weight: 0.1
  perceptual_loss_weight: 0.0
  feature_loss_weight: 0.1
  pose_align_loss_weight: 1.0

  lr: 0.0005
  train_steps: 100000
  no_pass_steps: 100

  num_views: 2
  num_input_views: 1
  num_target_views: 1
  target_has_input: false
  random_split: false
  view_selector:
    type: two_frame
    min_frame_dist: 24
    max_frame_dist: 72
    use_curriculum: true
    curriculum_iter: 30000
    curriculum_start_min_frame_dist: 16
    curriculum_start_max_frame_dist: 32
  num_threads: 8
  num_workers: 8
  prefetch_factor: 8
  print_every: 20

  square_crop: true
  use_amp: true
  use_rel_pose: false
  use_tf32: true
  vis_every: 1000

  log_backend: tensorboard
  wandb_project: spa3r
  wandb_exp_name: spa3r_dl3dv
  wandb_log_every: 50

  warmup: 3000
  weight_decay: 0.05

  render_video: render_video

inference:
  if_inference: False
  compute_metrics: False
  view_idx_file_path: ./data/rayzer_evaluation_index_dl3dv_even.json
  render_video: False
  render_video_config:
    traj_type: interpolate
    num_frames: 30
    loop_video: True
    order_poses: False
