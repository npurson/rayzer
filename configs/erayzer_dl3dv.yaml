model:
  class_name: model.erayzer.ERayZer
  image_tokenizer:
    image_size: 256
    patch_size: 16
    in_channels: 3
  input_with_pe: true
  target_image:
    height: 256
    width: 256
  transformer:
    d: 768
    d_head: 64
    encoder_n_layer: 16
    encoder_geom_n_layer: 16
    decoder_n_layer: 8      # unused for ERayZer, kept for compatibility
    special_init: true
    depth_init: true
    use_qk_norm: true
    fix_decoder: false
  gaussians:
    n_gaussians: 1
    sh_degree: 3
    range_setting:
      type: linear_depth
      near: 0
      far: 8
    upsampler:
      upsample_factor: 1
  gs_per_pixel_sqrt: 1
  hard_pixelalign: true
  scaling_bias: -3.0
  scaling_max: -2.0
  near_plane: 0.2
  use_gsplat: true
  use_deferred_rendering: false
  pose_latent:
    length: 1
    canonical: middle
    mode: pairwise
    representation: 6d

training:
  amp_dtype: bf16
  api_key_path: ./configs/api_keys.yaml
  batch_size_per_gpu: 6
  beta1: 0.9
  beta2: 0.95
  allowed_gradnorm_factor: 5.0
  center_crop: true
  scene_scale_factor: 1.35
  checkpoint_dir: ./experiments/checkpoints/erayzer_dl3dv
  checkpoint_every: 2000
  dataset_name: data.dataset_scene.Dataset
  dataset_path: /horizon-bucket/robot_lab/users/haoyi.jiang/repos/rayzer/dl3dv_10k_train.txt
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0

  l2_loss_weight: 1.0
  lpips_loss_weight: 0.0
  perceptual_loss_weight: 0.2

  lr: 0.0001
  train_steps: 152000
  no_pass_steps: 200

  num_views: 10
  num_input_views: 5
  num_target_views: 5
  target_has_input: false
  random_split: true
  domain_randomization: true

  view_selector:
    type: two_frame
    min_frame_dist: 32
    max_frame_dist: 64
    use_curriculum: true
    curriculum_iter: 86000
    curriculum_start_min_frame_dist: 4
    curriculum_start_max_frame_dist: 32

  num_threads: 8
  num_workers: 4
  prefetch_factor: 8
  print_every: 20

  square_crop: true
  use_amp: true
  use_rel_pose: true
  use_tf32: true
  vis_every: 500

  log_backend: tensorboard
  wandb_project: rayzer
  wandb_exp_name: erayzer_dl3dv
  wandb_log_every: 50
  wandb_offline: false

  warmup: 3000
  weight_decay: 0.05

  render_video: false

inference:
  if_inference: False
  compute_metrics: False
  view_idx_file_path: ./data/rayzer_evaluation_index_dl3dv_even.json
  render_video: False
  render_video_config:
    traj_type: interpolate
    num_frames: 30
    loop_video: True
    order_poses: False
