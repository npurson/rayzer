model:
  class_name: model.xfactor.XFactor
  embed_dim: 1024
  num_heads: 16
  aggregator_depth: 8
  decoder_depth: 8
  patch_size: 16
  image_size: 256
  pose_dim: 256
  num_pose_tokens: 32
  self_decode_prob: 0.05
  full_chance: 0.05
  image_tokenizer:
    image_size: 256
    patch_size: 16
    in_channels: 3
  target_image:
    height: 256
    width: 256
    patch_size: 16
    in_channels: 6

training:
  amp_dtype: bf16
  api_key_path: ./configs/api_keys.yaml
  batch_size_per_gpu: 32
  beta1: 0.9
  beta2: 0.95
  allowed_gradnorm_factor: 2.0
  center_crop: true
  scene_scale_factor: 1.35
  checkpoint_dir: ./experiments/checkpoints/xfactor_dl3dv_fd
  checkpoint_every: 2000
  dataset_name: data.dataset_scene.Dataset
  dataset_path: /horizon-bucket/robot_lab/users/haoyi.jiang/repos/rayzer/dl3dv_10k_train.txt
  grad_accum_steps: 1
  grad_checkpoint_every: 1
  grad_clip_norm: 1.0

  l2_loss_weight: 0.0
  lpips_loss_weight: 0.5
  perceptual_loss_weight: 0.0
  pose_augmentation: true

  lr: 0.0001
  train_steps: 600000
  no_pass_steps: 100

  num_views: 2
  num_input_views: 1
  num_target_views: 1
  target_has_input: false
  random_split: false
  view_selector:
    type: two_frame
    min_frame_dist: 16
    max_frame_dist: 48
    use_curriculum: true
    curriculum_iter: 30000
    curriculum_start_min_frame_dist: 8
    curriculum_start_max_frame_dist: 24
  num_threads: 8
  num_workers: 4
  prefetch_factor: 8
  print_every: 20

  square_crop: true
  use_amp: true
  use_rel_pose: false
  use_tf32: true
  vis_every: 1000

  log_backend: tensorboard
  wandb_project: xfactor
  wandb_exp_name: xfactor_dl3dv_fd
  wandb_log_every: 50

  warmup: 4000
  weight_decay: 0.005

  render_video: render_video

inference:
  if_inference: False
  compute_metrics: False
  view_idx_file_path: ./data/rayzer_evaluation_index_dl3dv_even.json
  render_video: False
  render_video_config:
    traj_type: interpolate
    num_frames: 30
    loop_video: True
    order_poses: False
